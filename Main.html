<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>CodeMaster Arena - Dashboard</title>

  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="style-new.css" />
  <link rel="icon" type="image/jpeg" href="CodeMaster Pro.jpeg" />
</head>

<body class="page-main">

  <!-- ===================================================== -->
  <!-- NAVBAR -->
  <!-- ===================================================== -->

  <header class="navbar">

    <div class="inner">

      <div
        class="logo"
        onclick="window.location.href='Main.html'"
        role="link"
        aria-label="CodeMaster Pro Home"
        style="cursor:pointer;"
      >
        <span aria-hidden="true">⌨️</span>

        CodeMaster Gamified

        <span class="dot">
          Logic Arena
        </span>
      </div>

      <nav class="nav-links" aria-label="Main Navigation">

        <button
          class="nav-link-btn active"
          onclick="window.location.href='Main.html'"
          aria-current="page"
        >
          <span aria-hidden="true">🏠</span>
          <span class="label">Home</span>
        </button>

        <button
          class="nav-link-btn"
          onclick="window.location.href='Learn.html'"
        >
          <span aria-hidden="true">📚</span>
          <span class="label">Learn</span>
        </button>

        <button
          class="nav-link-btn"
          onclick="window.location.href='Profile.html'"
        >
          <span aria-hidden="true">👤</span>
          <span class="label">Profile</span>
        </button>

        <button
          class="nav-link-btn"
          onclick="window.location.href='Leaderboard.html'"
        >
          <span aria-hidden="true">🏆</span>
          <span class="label">Leaderboard</span>
        </button>

        <button
          class="nav-link-btn"
          onclick="window.location.href='About.html'"
        >
          <span aria-hidden="true">ℹ️</span>
          <span class="label">About</span>
        </button>

        <button
          class="theme-toggle"
          id="themeToggle"
          aria-label="Toggle dark/light mode"
          title="Toggle Theme"
        >
          ☀️
        </button>

        <span
          class="user-info"
          id="displayUserName"
          aria-label="Current User Profile"
        ></span>

        <button
          class="nav-link-btn"
          onclick="logout()"
          style="color:var(--danger);"
          aria-label="Logout"
        >
          <span aria-hidden="true">🚪</span>
        </button>

      </nav>

    </div>

  </header>

  <!-- ===================================================== -->
  <!-- MAIN CONTENT -->
  <!-- ===================================================== -->

  <main
    id="main-content"
    style="
      max-width:1100px;
      margin:0 auto;
      padding:4rem 1rem 2rem;
    "
  >

    <!-- ===================================================== -->
    <!-- AI HERO SECTION -->
    <!-- ===================================================== -->

    <section
      class="glass-card"
      style="
        position:relative;
        height:340px;
        margin-bottom:3rem;
        overflow:hidden;
        border-radius:2rem;
        padding:2rem;
      "
    >

      <!-- Animated Background -->

      <div
        style="
          position:absolute;
          inset:0;

          background:
          linear-gradient(
            135deg,
            #00b7ff,
            #7c3aed,
            #ff0080,
            #00ffaa
          );

          opacity:0.12;
        "
      ></div>

      <!-- Blur Layer -->

      <div
        style="
          position:absolute;
          inset:0;
          backdrop-filter:blur(40px);
        "
      ></div>

      <!-- Main Hero Content -->

      <div
        style="
          position:relative;
          z-index:2;
          text-align:center;
          padding-top:3rem;
        "
      >

        <div
          style="
            font-size:4rem;
            margin-bottom:1rem;
            animation: float 5s ease-in-out infinite;
          "
          aria-hidden="true"
        >
          🤖
        </div>

        <h1
          class="ai-title"
          style="
            font-size:clamp(2.5rem,6vw,4.5rem);
            font-weight:900;
            margin-bottom:1rem;
            letter-spacing:-2px;
          "
        >
          Welcome,
          <span id="heroUserName"></span>
        </h1>

        <p
          style="
            font-size:1.15rem;
            color:var(--fg-muted);
            max-width:700px;
            margin:auto;
            line-height:1.7;
          "
        >
          Experience futuristic AI-powered coding education with immersive learning,
          animated challenges, interactive visuals, and next-generation programming mastery.
        </p>

      </div>

    </section>

    <!-- ===================================================== -->
    <!-- LANGUAGE GRID -->
    <!-- ===================================================== -->

    <section
      class="lang-grid"
      id="langGrid"
      aria-label="Available Programming Challenges"
      role="list"
    ></section>

  </main>

  <!-- ===================================================== -->
  <!-- AUTH -->
  <!-- ===================================================== -->

  <script src="auth.js"></script>

  <!-- ===================================================== -->
  <!-- MAIN SCRIPT -->
  <!-- ===================================================== -->

  <script>

    // =====================================================
    // AUTH GUARD
    // =====================================================

    if (!auth.isAuthenticated()) {
      window.location.href = 'index.html';
    }

    const user = auth.getCurrentUser();

    // =====================================================
    // CONFIG
    // =====================================================

    const languages = [

      {
        id: "html",
        name: "HTML5",
        icon: "🌐",
        qCount: 13,
        color: "#e34c26"
      },

      {
        id: "css",
        name: "CSS3",
        icon: "🎨",
        qCount: 13,
        color: "#264de4"
      },

      {
        id: "js",
        name: "JavaScript",
        icon: "🟨",
        qCount: 14,
        color: "#f7df1e"
      },

      {
        id: "py",
        name: "Python",
        icon: "🐍",
        qCount: 12,
        color: "#3776ab"
      },

      {
        id: "c",
        name: "C Programming",
        icon: "🔵",
        qCount: 10,
        color: "#a8b9cc"
      }

    ];

    // =====================================================
    // LOGOUT
    // =====================================================

    function logout() {

      auth.logout();

      window.location.href = 'index.html';
    }

    // =====================================================
    // GET USER STATS
    // =====================================================

    function getUserStats() {

      const stats = {};

      languages.forEach(lang => {

        const key =
          `codemaster_best_${user.email}_${lang.id}`;

        const best = localStorage.getItem(key);

        if (best) {
          stats[lang.id] = parseInt(best, 10);
        }

      });

      return stats;
    }

    // =====================================================
    // RENDER LANGUAGE GRID
    // =====================================================

    function renderLangGrid() {

      const grid =
        document.getElementById('langGrid');

      if (!grid) return;

      const userBestScores = getUserStats();

      grid.innerHTML = languages.map((lang, i) => {

        const bestScore =
          userBestScores[lang.id];

        const hasScore =
          bestScore !== undefined;

        const bestBadge = hasScore

          ? `
            <span
              role="status"
              style="
                font-size:0.75rem;
                font-family:var(--font-mono);

                padding:0.25rem 0.5rem;

                border-radius:9999px;

                background:rgba(34,197,94,0.15);

                color:var(--success);

                border:1px solid rgba(34,197,94,0.3);
              "
            >
              Best: ${bestScore}%
            </span>
          `

          : '';

        return `

          <article
            class="glass-card lang-card animate-slide-up ai-section"

            role="listitem"

            tabindex="0"

            aria-labelledby="title-${lang.id}"

            style="
              animation-delay:${i * 0.1}s;
              cursor:pointer;
            "

            onclick="startQuiz('${lang.id}')"

            onkeydown="
              if(event.key==='Enter' || event.key===' ') {
                event.preventDefault();
                startQuiz('${lang.id}');
              }
            "
          >

            <div
              style="
                display:flex;
                justify-content:space-between;
                align-items:flex-start;
                margin-bottom:1rem;
              "
            >

              <span
                style="font-size:2.5rem;"
                aria-hidden="true"
              >
                ${lang.icon}
              </span>

              ${bestBadge}

            </div>

            <h2
              id="title-${lang.id}"

              style="
                font-size:1.125rem;
                font-weight:700;
                margin-bottom:0.25rem;
              "
            >
              ${lang.name}
            </h2>

            <p
              style="
                font-size:0.875rem;
                color:var(--fg-muted);
                margin-bottom:1rem;
              "
            >
              ${lang.qCount} Challenges Available
            </p>

            <div
              class="ai-button"

              aria-hidden="true"

              style="
                display:block;
                width:100%;
                padding:0.7rem;

                border-radius:0.8rem;

                text-align:center;

                font-size:0.9rem;
                font-weight:700;

                color:white;
              "
            >
              Start Challenge →
            </div>

          </article>

        `;

      }).join('');
    }

    // =====================================================
    // START QUIZ
    // =====================================================

    function startQuiz(langId) {

      localStorage.setItem(
        'selectedLang',
        langId
      );

      window.location.href =
        'Quiz.html';
    }

    // =====================================================
    // INITIALIZE
    // =====================================================

    if (user) {

      const firstName =
        user.name?.split(' ')[0] ?? 'Coder';

      const heroName =
        document.getElementById('heroUserName');

      const displayName =
        document.getElementById('displayUserName');

      if (heroName)
        heroName.textContent = firstName;

      if (displayName)
        displayName.textContent = `@${firstName}`;

      renderLangGrid();
    }

  </script>

</body>
</html>
