<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeMaster Arena - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/jpeg" href="CodeMaster Pro.jpeg">
</head>
<body>
  <main class="perspective-container">
    <div class="cube-login" id="cubeLogin">
      <section class="cube-face">
        <div class="cube-bg" aria-hidden="true"></div>
        
        <header style="text-align:center; margin-bottom:2rem; position:relative; z-index:1;">
          <div style="font-size:2.5rem; margin-bottom:1rem;" class="animate-float" aria-hidden="true">⚡</div>
          <h1 style="color:var(--primary); letter-spacing:2px; font-size:1.5rem; font-weight:700;" class="neon-text">System Override</h1>
          <p style="color:var(--fg-muted); font-size:0.8rem; margin-top:0.5rem;">Authentication Protocol</p>
        </header>

        <form id="loginForm" style="position:relative; z-index:1;" novalidate>
          <div class="form-group">
            <label for="userName">Operative Identity</label>
            <input type="text" id="userName" name="userName" placeholder="Enter Name" required autocomplete="name">
          </div>

          <div class="form-group">
            <label for="userEmail">Secure University Clearance</label>
            <input type="email" id="userEmail" name="userEmail" placeholder="id@chitkara.edu.in" 
                   required autocomplete="email" aria-describedby="emailError">
            
            <p class="error-msg" id="emailError" role="alert" style="display:none;">
              ACCESS DENIED. Invalid clearance domain.
            </p>
          </div>

          <button type="submit" class="btn-login">Initialize Link</button>
        </form>
      </section>
    </div>
  </main>

<script>
  // 1. CONFIGURATION & CONSTANTS
  const CONFIG = {
    REDIRECT_PAGE: "Main.html",
    ALLOWED_DOMAIN: "@chitkara.edu.in",
    STORAGE_KEY: "codemaster_user"
  };

  // 2. MODULAR AUTH GUARD
  // Prevents logged-in users from seeing the login page again
  const checkExistingSession = () => {
    try {
      if (sessionStorage.getItem(CONFIG.STORAGE_KEY)) {
        window.location.href = CONFIG.REDIRECT_PAGE;
      }
    } catch (e) {
      console.warn("Storage access denied:", e);
    }
  };

  // 3. PERFORMANCE OPTIMIZED ANIMATION (Shake Logic)
  // Provides visual feedback on failed validation
  const triggerShake = (element) => {
    // Toggles a CSS class to offload animation work to the browser compositor
    element.classList.add('shake-animation');
    element.addEventListener('animationend', () => {
      element.classList.remove('shake-animation');
    }, { once: true });
    
    // JS Fallback for immediate visual feedback
    element.style.transform = "translateX(-10px)";
    setTimeout(() => element.style.transform = "translateX(0)", 300);
  };

  // 4. MAIN FORM CONTROLLER
  // Handles form submission, email domain validation, and session creation if validation is successful
  const handleLogin = (e) => {
    e.preventDefault();

    // Data Extraction
    const form = e.target;
    const name = document.getElementById("userName").value.trim();
    const email = document.getElementById("userEmail").value.trim().toLowerCase();
    
    const emailInput = document.getElementById("userEmail");
    const errDiv = document.getElementById("emailError");
    const box = document.getElementById("cubeLogin");

    // VALIDATION LOGIC: Check for specific university domain
    if (!email.endsWith(CONFIG.ALLOWED_DOMAIN)) {
      errDiv.style.display = "block";
      emailInput.setAttribute("aria-invalid", "true");
      triggerShake(box);
      emailInput.focus();
      return;
    }

    // SUCCESSFUL VALIDATION & SESSION STORAGE
    try {
      errDiv.style.display = "none";
      emailInput.setAttribute("aria-invalid", "false");

      // ES6 Object Shorthand to create user profile
      const userData = { name, email };
      sessionStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(userData));
      
      // Navigate to the main application
      window.location.href = CONFIG.REDIRECT_PAGE;
    } catch (error) {
      // Handles rare cases like disabled storage or private mode restrictions
      alert("System Error: Could not save session. Please check browser settings.");
      console.error("Session storage failed:", error);
    }
  };

  // 5. INITIALIZATION
  document.addEventListener("DOMContentLoaded", () => {
    // Run safety check on load (check for an existing session)
    checkExistingSession();
    
    // Attach event listener to the form
    const loginForm = document.getElementById("loginForm");
    if (loginForm) {
      loginForm.addEventListener("submit", handleLogin);
    }
  });

  //API
// ========================================================
// REFINED SCI-FI AUDIO SYSTEM (Single Hover Sound Only) 
// ========================================================

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// A single, premium "Tick" sound 
function playInteractionSound() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  
  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  
  oscillator.type = 'sine'; // Extremely smooth sound
  oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); 
  oscillator.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.04); // Instant pitch drop
  
  gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime); // Very quiet (5%)
  gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04); // Instantly fades out
  
  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  
  oscillator.start();
  oscillator.stop(audioCtx.currentTime + 0.04);
}

// Select all the visual cards on your page
const interactiveElements = document.querySelectorAll('.lang-card, .diff-card, .btn-login, .option-btn, .nav-link-btn, .feature-card');

// Attach the ONE sound to the starting hover ONLY
interactiveElements.forEach(element => {
  element.addEventListener('mouseenter', () => playInteractionSound());
});
</script>
</body>
</html>
